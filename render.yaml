services:
  - type: web
    name: neuraforge-api
    env: docker
    plan: starter # Recomendado para producción (cambiar a 'pro' si necesitas escalado)
    region: ohio
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        # IMPORTANTE: Crear una BD PostgreSQL en Render primero
        # Copiar la URL de conexión aquí. Ej:
        # postgresql://user:password@host:port/dbname
        sync: false
      - key: SECRET_KEY
        generateValue: true # Render genera automáticamente
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 1440 # 24 horas
      - key: STRIPE_SECRET_KEY
        sync: false # Debe agregarse manualmente en Render
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
      - key: MP_ACCESS_TOKEN
        sync: false
