version: '3.8'

services:
  api:
    build: .
    container_name: neuraforge-api
    ports:
      - "8000:10000"
    environment:
      DATABASE_URL: sqlite:///./database.db
      SECRET_KEY: desarrollo-key-cambiar-en-produccion
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      PORT: 10000
    volumes:
      - .:/app
    command: uvicorn main:app --host 0.0.0.0 --port 10000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:10000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
